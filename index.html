    <!-- Create stub client FIRST to prevent reference errors in Orca scripts -->
    <script>
    // Create a minimal stub client object to prevent reference errors
    // when Orca scripts run before the real client is initialized
    window.client = {
        orca: { f: 0, w: 1, h: 1, s: '', variables: {}, glyphAt: function() { return '.'; }, valueOf: function() { return 0; }, inBounds: function() { return false; }, write: function() { return false; }, lock: function() {}, unlock: function() {}, lockAt: function() { return false; }, indexAt: function() { return 0; } },
        io: { midi: { push: function() {}, run: function() {}, sendClock: function() {}, sendClockStart: function() {}, toInputString: function() { return ''; }, toOutputString: function() { return ''; } }, cc: { push: function() {}, run: function() {} }, mono: { push: function() {}, run: function() {} }, udp: { push: function() {}, run: function() {}, send: function() {} }, osc: { push: function() {}, run: function() {}, send: function() {} }, start: function() {}, clear: function() {}, run: function() {} },
        theme: { default: {}, active: {}, load: function() {}, start: function() {}, install: function() {} },
        cursor: { x: 0, y: 0, w: 1, h: 1, start: function() {}, reset: function() {}, move: function() {}, erase: function() {}, selectAll: function() {}, selection: function() { return function() {}; } },
        source: { new: function() {}, cache: {} },
        history: { reset: function() {}, record: function() {}, undo: function() {}, redo: function() {}, bind: function() {} },
        commander: { isActive: false, start: function() {}, stop: function() {}, run: function() {} },
        clock: { isPaused: true, isPuppet: false, togglePlay: function() {}, play: function() {}, stop: function() {}, run: function() {}, touch: function() {}, setFrame: function() {} },
        acels: { set: function() {}, add: function() {}, install: function() {}, pipe: function() {} },
        start: function() {},
        update: function() {},
        run: function() {},
        reset: function() {},
        resize: function() {},
        clear: function() {}
    };
    
    // Override Node.js require for browser - return undefined for all modules
    window.require = function(name) {
        return undefined;
    };
    </script>

    <script>
    // Setup nbcli UI layer functionality
    function setupNbcliUI() {
      const promptEl = document.getElementById('nbcli-prompt');
      const inputEl = document.getElementById('nbcli-input');
      const terminalEl = document.getElementById('nbcli-terminal');
      
      // Debug: Log if elements are found
      console.log('setupNbcliUI: promptEl =', promptEl, 'inputEl =', inputEl, 'terminalEl =', terminalEl);
      
      if (!promptEl || !inputEl || !terminalEl) {
        console.error('setupNbcliUI: One or more elements not found!');
        return;
      }
      
      // Debug: Ensure prompt is visible
      console.log('setupNbcliUI: Setting prompt display to inline');
      promptEl.style.display = 'inline';
      inputEl.style.display = 'none';
      
      // Debug: Check nbcli-ui container
      const nbcliUI = document.getElementById('nbcli-ui');
      if (nbcliUI) {
        console.log('setupNbcliUI: nbcli-ui found, display =', nbcliUI.style.display);
        nbcliUI.style.display = 'flex';
        nbcliUI.style.position = 'fixed';
        nbcliUI.style.top = '10px';
        nbcliUI.style.right = '10px';
        nbcliUI.style.zIndex = '20';
      } else {
        console.error('setupNbcliUI: nbcli-ui container not found!');
      }
      
      // Track active state for TAB switching
      let nbcliActive = false;
      let orcaCommanderWasActive = false;
      // Expose nbcliActive as a getter
      Object.defineProperty(window, 'nbcliActive', { get: () => nbcliActive });
      
      // Command history
      const commandHistory = [];
      let historyIndex = -1;
      
      // Function to activate nbcli
      function activateNbcli() {
        nbcliActive = true;
        promptEl.style.display = 'inline';
        inputEl.style.display = 'inline-block';
        inputEl.focus();
        
        // Deactivate Orca commander if active
        if (window.client && window.client.commander && window.client.commander.isActive) {
          orcaCommanderWasActive = true;
          window.client.commander.stop();
        }
        
        // Blur Orca canvas to prevent it from receiving keyboard events
        if (window.client && window.client.el) {
          window.client.el.blur();
        }
      }
      
      // Function to deactivate nbcli
      function deactivateNbcli() {
        nbcliActive = false;
        promptEl.style.display = 'none';
        inputEl.style.display = 'none';
        
        // Reactivate Orca commander if it was active
        if (orcaCommanderWasActive && window.client && window.client.commander) {
          window.client.commander.start();
          orcaCommanderWasActive = false;
        }
        
        // Refocus Orca canvas to restore keyboard handling
        if (window.client && window.client.el) {
          window.client.el.focus();
        }
      }
      
      // Expose functions to window for cross-script access
      window.activateNbcli = activateNbcli;
      window.deactivateNbcli = deactivateNbcli;
      
      // Document-level listener for nbcli/Orca switching
      document.addEventListener('keydown', function(e) {
        // Check for CMD/CTRL + K
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          e.stopPropagation();
          
          const nbcliUI = document.getElementById('nbcli-ui');
          
          // If UI is hidden (display: none), restore it first
          if (nbcliUI && nbcliUI.style.display === 'none') {
            nbcliUI.style.display = 'flex';
            // Restore collapsed state if it was collapsed when hidden
            if (nbcliUI.dataset.wasCollapsed === 'true') {
              const terminalEl = document.getElementById('nbcli-terminal');
              if (terminalEl) {
                terminalEl.classList.add('collapsed');
                terminalEl.style.maxHeight = '20px';
                terminalEl.style.overflow = 'hidden';
              }
            }
            activateNbcli();
          } else if (nbcliActive) {
            deactivateNbcli();
          } else {
            activateNbcli();
          }
          return false; // Extra safety
        }
        
        // Backtick (`) to show nbcli if hidden
        if (e.key === '`' && !e.metaKey && !e.ctrlKey && !e.shiftKey && !e.altKey) {
          const nbcliUI = document.getElementById('nbcli-ui');
          if (nbcliUI && nbcliUI.style.display === 'none') {
            // Was hidden, restore it
            e.preventDefault();
            e.stopPropagation();
            nbcliUI.style.display = 'flex';
            
            // Restore collapsed state if it was collapsed when hidden
            if (nbcliUI.dataset.wasCollapsed === 'true') {
              const terminalEl = document.getElementById('nbcli-terminal');
              if (terminalEl) {
                terminalEl.classList.add('collapsed');
                terminalEl.style.maxHeight = '20px';
                terminalEl.style.overflow = 'hidden';
                const messages = terminalEl.querySelectorAll('div');
                messages.forEach(msg => {
                  msg.style.whiteSpace = 'nowrap';
                  msg.style.overflow = 'hidden';
                  msg.style.textOverflow = 'ellipsis';
                });
              }
            }
            
            // Focus the input
            const inputEl = document.getElementById('nbcli-input');
            if (inputEl) {
              inputEl.focus();
            }
            return false;
          }
        }
        
        // TAB to toggle between nbcli and Orca
        if (e.key === 'Tab' && !e.shiftKey) {
          e.preventDefault();
          e.stopPropagation();
          
          if (nbcliActive) {
            deactivateNbcli();
          } else {
            activateNbcli();
          }
          return false;
        }
      });
      
      // Show input when prompt is clicked and prevent Orca from receiving mouse events
      promptEl.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        activateNbcli();
      });
      
      // Prevent mouse events on nbcli elements from reaching Orca
      promptEl.addEventListener('mousedown', function(e) {
        e.preventDefault();
        e.stopPropagation();
      });
      
      inputEl.addEventListener('mousedown', function(e) {
        e.preventDefault();
        e.stopPropagation();
      });
      
      terminalEl.addEventListener('mousedown', function(e) {
        e.preventDefault();
        e.stopPropagation();
      });
      
      // Handle input
      inputEl.addEventListener('keydown', function(e) {
        // Always stop propagation when nbcli input is focused
        // This prevents ALL keyboard events from reaching Orca
        e.stopPropagation();
        
        // Prevent Orca from handling these keys when nbcli input is focused
        // For space: only prevent default if it would scroll (allow space to be typed)
        // For arrow keys: Up/Down handled for history, Left/Right allowed for cursor movement
        // For backspace: prevent default but allow input to handle it
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
          e.preventDefault();
        }
        
        // Handle Enter key
        if (e.key === 'Enter') {
          e.preventDefault();
          e.stopPropagation();
          
          const command = inputEl.value.trim();
          if (command) {
            // Add to history
            commandHistory.push(command);
            historyIndex = -1;
            
            // Display command in terminal with per-word coloring
            const commandSpan = document.createElement('div');
            const commandParts = command.split(/\s+/);
            const coloredCommand = document.createElement('span');
            
            // Add prompt
            const promptSpan = document.createElement('span');
            promptSpan.textContent = 'nbcli: ';
            promptSpan.style.color = '#00BFFF';
            coloredCommand.appendChild(promptSpan);
            
            // Color each word of the command
            commandParts.forEach((word, index) => {
              const wordSpan = document.createElement('span');
              const wordClass = getWordClass(word);
              wordSpan.className = 'cmd-word ' + wordClass;
              wordSpan.textContent = word + (index < commandParts.length - 1 ? ' ' : '');
              coloredCommand.appendChild(wordSpan);
            });
            
            commandSpan.appendChild(coloredCommand);
            commandSpan.style.display = 'block';
            commandSpan.style.marginBottom = '4px';
            terminalEl.appendChild(commandSpan);
            
            // Process command
            if (window.parseCommand) {
              try {
                const result = window.parseCommand(command);
                if (result) {
                  if (result.error) {
                    // Display error message
                    const errorSpan = document.createElement('div');
                    errorSpan.textContent = result.error;
                    errorSpan.style.color = '#ff4444';
                    errorSpan.style.display = 'block';
                    errorSpan.style.marginBottom = '4px';
                    terminalEl.appendChild(errorSpan);
                  } else if (result.output) {
                    const outputSpan = document.createElement('div');
                    if (result.isHtml) {
                      // If output is HTML, use innerHTML
                      outputSpan.innerHTML = result.output;
                    } else {
                      // Otherwise, create text with color
                      outputSpan.textContent = result.output;
                      outputSpan.style.color = '#8699A9';
                    }
                    outputSpan.style.display = 'block';
                    outputSpan.style.marginBottom = '4px';
                    terminalEl.appendChild(outputSpan);
                  }
                }
              } catch (error) {
                const errorSpan = document.createElement('div');
                errorSpan.textContent = 'Error: ' + error.message;
                errorSpan.style.color = '#ff4444';
                errorSpan.style.display = 'block';
                errorSpan.style.marginBottom = '4px';
                terminalEl.appendChild(errorSpan);
              }
            } else {
              const outputSpan = document.createElement('div');
              outputSpan.textContent = 'nbcli commands not available';
              outputSpan.style.color = '#8699A9';
              outputSpan.style.display = 'block';
              outputSpan.style.marginBottom = '4px';
              terminalEl.appendChild(outputSpan);
            }
            
            // Scroll terminal to bottom
            terminalEl.scrollTop = terminalEl.scrollHeight;
          }
          inputEl.value = '';
          deactivateNbcli();
        }
        
        // Handle Up arrow for history
        if (e.key === 'ArrowUp' && commandHistory.length > 0) {
          e.preventDefault();
          if (historyIndex < 0) {
            historyIndex = commandHistory.length - 1;
          } else if (historyIndex > 0) {
            historyIndex--;
          }
          inputEl.value = commandHistory[historyIndex];
        }
        
        // Handle Down arrow for history
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyIndex >= 0) {
            historyIndex++;
            if (historyIndex < commandHistory.length) {
              inputEl.value = commandHistory[historyIndex];
            } else {
              inputEl.value = '';
              historyIndex = -1;
            }
          }
        }
        
        // Handle Escape to hide nbcli
        if (e.key === 'Escape' && nbcliActive) {
          deactivateNbcli();
          inputEl.value = '';
          e.preventDefault();
        }
      });
      
      // Prevent paste events from reaching Orca
      inputEl.addEventListener('paste', function(e) {
        e.stopPropagation();
      });
      
      // Also prevent keyup and keypress from reaching Orca
      inputEl.addEventListener('keyup', function(e) {
        e.stopPropagation();
      });
      
      inputEl.addEventListener('keypress', function(e) {
        e.stopPropagation();
      });
      
      // Hide input when blurred
      inputEl.addEventListener('blur', function() {
        // Don't hide if we're switching to another nbcli element
        // The TAB handler will manage activation/deactivation
      });
      
      // Function to map words to their CSS classes for per-word highlighting
      function getWordClass(word) {
        // Check if it's a number
        if (!isNaN(word) && !isNaN(parseFloat(word))) {
          return 'cmd-num';
        }
        
        // Map specific words to their classes using magfoto colors
        const wordToClass = {
          // Yellow (hsla(40,90%,75%,0.75) / black at 75%)
          'new': 'cmd-new',
          
          // Blue (hsla(215,100%,80%,0.25) / hsla(190,100%,40%,0.75))
          'geo': 'cmd-geo',
          'wrld': 'cmd-blue',
          'morph': 'cmd-blue',
          'lz': 'cmd-lz',
          'sketch': 'cmd-blue',
          'graph': 'cmd-blue',
          
          // Cyan (hsla(191,100%,60%,0.25) / hsla(192,100%,60%,0.75))
          'plato': 'cmd-plato',
          'proc': 'cmd-proc',
          'model': 'cmd-model',
          'nurbs': 'cmd-cyan',
          'typo': 'cmd-typo',
          'bfg': 'cmd-cyan',
          'biomes': 'cmd-cyan',
          'shady': 'cmd-cyan',
          'frag': 'cmd-cyan',
          'movie': 'cmd-cyan',
          'rossler': 'cmd-cyan',
          'particles': 'cmd-cyan',
          'eca': 'cmd-cyan',
          'terra': 'cmd-cyan',
          
          // Magenta (hsla(331,100%,60%,0.25) / hsla(325,100%,70%,0.75))
          'aio': 'cmd-sonic',
          'lttp': 'cmd-sonic',
          'nature': 'cmd-sonic',
          'midi': 'cmd-sonic',
          'wave': 'cmd-sonic',
          'grain': 'cmd-sonic',
          'spk': 'cmd-sonic',
          'synth': 'cmd-sonic',
          
          // Green (hsla(160,100%,80%,0.25) / hsla(100,100%,40%,0.75))
          'help': 'cmd-utility',
          'clear': 'cmd-utility',
          'echo': 'cmd-utility',
          'ls': 'cmd-utility',
          'pwd': 'cmd-utility',
          's': 'cmd-utility',
          'o': 'cmd-utility',
          'q': 'cmd-utility',
          'qs': 'cmd-utility',
          'camera': 'cmd-utility',
          'sky': 'cmd-utility',
          'fpic': 'cmd-utility',
          'zap': 'cmd-utility',
          'timer': 'cmd-utility',
          
          // Red (hsla(0,100%,60%,0.25) / hsla(25,100%,60%,0.75))
          'cv': 'cmd-red',
          'lfo': 'cmd-red'
        };
        
        return wordToClass[word.toLowerCase()] || 'cmd-default';
      }
      
      // Function to clear the terminal
      window.clearTerminal = function() {
        terminalEl.innerHTML = '';
        // Re-add the up arrow
        const arrowSpan = document.createElement('div');
        arrowSpan.innerHTML = '&uarr;';
        arrowSpan.style.color = '#8699A9';
        arrowSpan.style.textAlign = 'right';
        arrowSpan.style.marginBottom = '4px';
        terminalEl.appendChild(arrowSpan);
      };
      
      // Function to add message to terminal (for use by ThreeCommands)
      window.addTerminalMessage = function(message, isError) {
        const outputSpan = document.createElement('div');
        outputSpan.textContent = message;
        outputSpan.style.display = 'block';
        outputSpan.style.marginBottom = '4px';
        if (isError) {
          outputSpan.style.color = '#ff4444';
        } else {
          outputSpan.style.color = '#8699A9';
        }
        terminalEl.appendChild(outputSpan);
        // Scroll to bottom
        terminalEl.scrollTop = terminalEl.scrollHeight;
      };
      
      // Make it available to ThreeCommands
      window.addToTerminal = window.addTerminalMessage;
      
      // Add up arrow prompt
      const arrowSpan = document.createElement('div');
      arrowSpan.innerHTML = '&uarr;';
      arrowSpan.style.color = '#8699A9';
      arrowSpan.style.textAlign = 'right';
      arrowSpan.style.marginBottom = '4px';
      terminalEl.appendChild(arrowSpan);
    }
    </script>

<body>
    <!-- Loading indicator -->
    <div id="loading">Initializing nbcli + Orca...</div>
    
    <!-- THREE.js canvas (background) -->
    <canvas id="three-canvas"></canvas>

    <!-- Orca container (overlay) -->
    <div id="orca-container"></div>
    
    <!-- nbcli UI layer (top-most) -->
    <div id="nbcli-ui">
      <div id="nbcli-prompt" style="display: inline;">nbcli: </div>
      <input type="text" id="nbcli-input" autocomplete="off" spellcheck="false" style="display: none;" />
      <div id="nbcli-terminal"></div>
    </div>
    
    <!-- Custom pointer/cursor - translucent circle that pulsates with Orca BPM -->
    <div id="custom-pointer"></div>
    
    <!-- nbcli THREE.js manager -->
    <script src="js/rnbo-manager.js"></script>
    <script src="js/nbcli-parser.js"></script>
    <script src="js/three-manager.js"></script>
    <script src="js/main.js"></script>

    <!-- Loaded after THREE.js so ThreeCommands is available -->
    <script src="js/orca-o-sigv.js"></script>
    
    <!-- Initialize Orca with nbcli theme -->
    <script>
    'use strict'
    
    // Wait for DOM to be ready
    document.addEventListener('DOMContentLoaded', function() {
      const container = document.getElementById('orca-container');
      
      // Recreate client properly now that DOM is ready
      // The global Client constructor is available from client.js
      const Client = window.Client;
      const client = new Client();
      
      // Overwrite the stub client with the real one
      window.client = client;
      window.orcaClient = client;
      

      // Configure for nbcli integration
      // Canvas is 780x550 (grid 20x20 at 39x23 + 2 rows for interface)
      // Tile size: 780/20 = 39, 506/20 = 25.3 ≈ 25 for grid, but we use 23 to match original
      client.tile = { w: 39, h: 23 };
      client.grid = { w: 20, h: 20 };
      
      client.install(container);
      
      // Override Orca's CMD+K shortcut to ensure nbcli terminal always opens
      // We want CMD+K to open nbcli terminal, not Orca commander
      // This works because acels.set() updates the registered handler
      if (client.acels && client.acels.set) {
        client.acels.set('Project', 'Toggle Commander', 'CmdOrCtrl+K', function() {
          console.log('Orca CMD+K overridden - nbcli terminal will handle this');
          // Don't call commander.start() - let nbcli handle it
        });
      }
      
      // Set canvas dimensions: 780 width, 506 height (20 rows grid + 2 rows interface)
      // Tile size: 39x23, Grid: 20x20 = 780x460, Interface: 2 rows = 46px, Total: 506px
      if (client.el) {
        const dpr = window.devicePixelRatio || 1;
        client.el.width = 780 * dpr;
        client.el.height = 506 * dpr;
        client.el.style.width = '780px';
        client.el.style.height = '506px';
        client.el.style.minWidth = '380px';
        client.el.style.minHeight = '400px';
        client.el.style.background = 'transparent';
        client.el.style.opacity = '1';
        client.el.style.textTransform = 'uppercase';
        client.el.style.imageRendering = 'pixelated';
      }
      
      // Apply nbcli theme
      if (client.theme) {
        client.theme.default = {
          background: 'transparent',
          f_high: '#8699A9',
          f_med: '#444444',
          f_low: '#222222',
          f_inv: '#1D1E23',
          b_high: '#00BFFF',
          b_med: '#444444',
          b_low: '#1D1E23',
          b_inv: '#8699A9'
        };
        client.theme.active = { ...client.theme.default };
        client.theme.load(client.theme.default);
      }
      
      // Don't override resize - let Orca handle it normally
      // We'll position the container after Orca starts and calculates its dimensions
      
      // Start Orca first
      client.start();
      

      
      // Override Orca's CMD+K shortcut to ensure nbcli terminal always opens
      // Add capture-phase listener to intercept before Orca gets it
      const orcaContainer = document.getElementById('orca-container');
      if (orcaContainer) {
        orcaContainer.addEventListener('keydown', function(e) {
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.stopImmediatePropagation();
            console.log('CMD+K intercepted at orca-container capture phase');
          }
        }, true); // capture phase
      }
      
      // Also add document-level capture listener as backup
      document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          console.log('CMD+K captured at document level');
        }
      }, true); // capture phase
      
      // Setup user gesture-based MIDI initialization
      // Browsers require user gesture (click) for MIDI access
      let midiInitialized = false;
      function ensureMidiInitialized() {
        if (midiInitialized) return;
        midiInitialized = true;
        
        // Initialize RNBO Manager
        if (window.RNBOManager && typeof window.RNBOManager.init === 'function') {
          window.RNBOManager.init().then(() => {
            console.log('RNBO Manager initialized');
          }).catch(err => {
            console.warn('RNBO Manager initialization failed:', err);
          });
        }
        
        // Refresh Orca's MIDI system to request access with user gesture
        if (window.client && window.client.io && window.client.io.midi && window.client.io.midi.refresh) {
          window.client.io.midi.refresh();
        }
        
        // Also ensure an output device is selected
        if (window.client && window.client.io && window.client.io.midi) {
          const midi = window.client.io.midi;
          if (midi.outputs && midi.outputs.length > 0 && midi.outputIndex === -1) {
            midi.selectOutput(0);
            console.log('MIDI: Auto-selected first output device:', midi.outputDevice()?.name);
          }
        }
        
        // Remove the event listener after first initialization
        document.removeEventListener('click', ensureMidiInitialized);
        document.removeEventListener('keydown', ensureMidiInitialized);
      }
      
      // Add event listeners for user gesture
      document.addEventListener('click', ensureMidiInitialized, { once: true, passive: true });
      document.addEventListener('keydown', ensureMidiInitialized, { once: true, passive: true });
      
      // Also try to initialize after a short delay in case user has already interacted
      setTimeout(() => {
        if (!midiInitialized) {
          ensureMidiInitialized();
        }
      }, 500);
      
      // Wait for Orca to fully initialize and render before positioning
      // This ensures all dimensions are calculated correctly
      // Use requestAnimationFrame + timeout to ensure Orca is fully ready
      requestAnimationFrame(function() {
        setTimeout(function() {
          requestAnimationFrame(function() {
        // Now that Orca has started and calculated its canvas dimensions,
        // we can position the container and patch mousePick
        function updateContainerPosition() {
          // Use Orca's actual canvas element dimensions
          // Orca sets these in its resize method
          let canvasWidth = 780;
          let canvasHeight = 506;
          
          if (client.el && client.el.style.width && client.el.style.height) {
            canvasWidth = parseInt(client.el.style.width);
            canvasHeight = parseInt(client.el.style.height);
          }
          
          const vw = window.innerWidth;
          const vh = window.innerHeight;
          
          // Calculate offset to center the canvas with extra top padding
          // Canvas is positioned at (30, 30) relative to container
          // Add extra padding to prevent top cutoff
          const offsetX = vw / 2 - canvasWidth / 2 - 30;
          const offsetY = vh / 2 - canvasHeight / 2 + 20;  // +20 instead of -30 for top padding
          
          if (container) {
            container.style.left = offsetX + 'px';
            container.style.top = offsetY + 'px';
          }
          return { offsetX, offsetY, canvasWidth, canvasHeight };
        }
        
        // Position container and patch mousePick AFTER Orca has started
        const offsets = updateContainerPosition();
        
        // Force a redraw to update the guide position
        if (client.update) {
          client.update();
        }
        
        if (client.cursor && client.cursor.mousePick) {
          const originalMousePick = client.cursor.mousePick.bind(client.cursor);
          client.cursor.mousePick = function(x, y, w, h) {
            // Adjust for container offset
            x = x - offsets.offsetX;
            y = y - offsets.offsetY;
            return originalMousePick(x, y, w, h);
          };
          
          // Update on resize
          window.addEventListener('resize', function() {
            const newOffsets = updateContainerPosition();
            if (client.cursor && client.cursor.mousePick) {
              client.cursor.mousePick = function(x, y, w, h) {
                x = x - newOffsets.offsetX;
                y = y - newOffsets.offsetY;
                return originalMousePick(x, y, w, h);
              };
            }
          });
        }
        
        // Set global reference
        window.orcaClient = client;
        

        
        // Focus the canvas for keyboard input
        if (client.el) {
          client.el.focus();
        }
        
        // Hide loading
        const loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
        
        // Setup nbcli UI layer
        setupNbcliUI();
        
        // Setup custom pointer that pulsates with Orca BPM
        setupCustomPointer();
          });
        }, 100); // End of setTimeout
      }); // End of outer requestAnimationFrame
    });
    </script>
    
    <!-- Custom pointer script -->
    <script>
    function setupCustomPointer() {
      const pointer = document.getElementById('custom-pointer');
      if (!pointer) return;
      
      // Set initial size - smaller than Orca grid cell (Orca cells are ~25px)
      const baseSize = 12; // Smaller than Orca cell
      pointer.style.width = baseSize + 'px';
      pointer.style.height = baseSize + 'px';
      
      // Hide initially
      pointer.style.display = 'none';
      
      // Track mouse position
      document.addEventListener('mousemove', (e) => {
        pointer.style.left = e.clientX + 'px';
        pointer.style.top = e.clientY + 'px';
        pointer.style.display = 'block';
      });
      
      // Hide when mouse leaves window
      document.addEventListener('mouseleave', () => {
        pointer.style.display = 'none';
      });
      
      // Pulsate animation using anime.js
      // Get BPM from Orca - try multiple sources
      function getBpm() {
        // Try client.clock.speed.value first
        if (window.client && window.client.clock && window.client.clock.speed) {
          return window.client.clock.speed.value || 120; // Default to 120 if not available
        }
        // Try localStorage
        if (window.localStorage && window.localStorage.getItem('bpm')) {
          return parseInt(window.localStorage.getItem('bpm')) || 120;
        }
        // Default
        return 120;
      }
      
      // Animate the pointer to pulsate with BPM
      function animatePointer() {
        const bpm = getBpm();
        // Calculate beat duration in ms: 60000ms / bpm = ms per beat
        const beatDuration = 60000 / bpm;
        // Scale factor for pulsation (1.0 to 1.3)
        const scaleMin = 1.0;
        const scaleMax = 1.3;
        
        anime({
          targets: pointer.style,
          transform: [
            `translate(-50%, -50%) scale(${scaleMin})`,
            `translate(-50%, -50%) scale(${scaleMax})`,
            `translate(-50%, -50%) scale(${scaleMin})`
          ],
          duration: beatDuration,
          easing: 'easeInOutSine',
          loop: true,
          direction: 'alternate'
        });
      }
      
      // Start animation
      animatePointer();
      
      // Update animation when BPM changes
      // Check BPM every second and update if changed
      let lastBpm = getBpm();
      setInterval(() => {
        const currentBpm = getBpm();
        if (currentBpm !== lastBpm) {
          lastBpm = currentBpm;
          // Remove existing animation and restart
          anime.remove(pointer.style);
          animatePointer();
        }
      }, 1000);
    }
    </script>
